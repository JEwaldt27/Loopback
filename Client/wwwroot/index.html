<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineFlow</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Client.styles.css" rel="stylesheet" />
    <link href="_content/Z.Blazor.Diagrams/style.min.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Z.Blazor.Diagrams/script.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        window.saveAsFile = function (filename, content) {
            const a = document.createElement('a');
            a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.exportToPdf = async function (title) {
            const canvasArea = document.querySelector('.canvas-area');
            const originalBg = canvasArea.style.background;
            canvasArea.style.background = '#ffffff';

            const snapshot = await html2canvas(canvasArea, { backgroundColor: '#ffffff', scale: 2 });
            canvasArea.style.background = originalBg;

            const imgData = snapshot.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 10;

            pdf.setFontSize(16);
            pdf.setTextColor(40, 40, 40);
            pdf.text(title || 'Line Flow Diagram', margin, margin + 6);

            const date = new Date().toLocaleDateString();
            pdf.setFontSize(10);
            pdf.setTextColor(120, 120, 120);
            pdf.text(date, pageWidth - margin, margin + 6, { align: 'right' });

            pdf.setDrawColor(200, 200, 200);
            pdf.line(margin, margin + 10, pageWidth - margin, margin + 10);

            const imgWidth = pageWidth - margin * 2;
            const imgHeight = (snapshot.height / snapshot.width) * imgWidth;
            const maxImgHeight = pageHeight - margin * 2 - 20;
            const finalHeight = Math.min(imgHeight, maxImgHeight);

            pdf.addImage(imgData, 'PNG', margin, margin + 14, imgWidth, finalHeight);
            pdf.save('lineflow-diagram.pdf');
        };
    </script>
</body>
</html>
